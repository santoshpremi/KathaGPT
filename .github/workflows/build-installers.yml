name: Build installers

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "src-tauri/**"
      - "src/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/build-installers.yml"

permissions:
  contents: read

concurrency:
  group: build-installers
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    env:
      NODE_OPTIONS: --max-old-space-size=8192
      CI: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm tauri build

      - name: Collect Linux installers
        run: |
          mkdir -p dist-installers
          find src-tauri/target/release/bundle -type f \( -name '*.AppImage' -o -name '*.deb' \) -exec cp {} dist-installers/ \;
          ls -la dist-installers/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: dist-installers/
          if-no-files-found: error

  build-mac-intel:
    runs-on: macos-latest
    env:
      NODE_OPTIONS: --max-old-space-size=8192
      CI: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm tauri build --target x86_64-apple-darwin

      - name: Collect Intel DMG
        run: |
          mkdir -p dist-installers
          find src-tauri/target -path '*/bundle/dmg/*.dmg' -exec cp {} dist-installers/ \;
          ls -la dist-installers/

      - uses: actions/upload-artifact@v4
        with:
          name: mac-intel-installer
          path: dist-installers/
          if-no-files-found: error
